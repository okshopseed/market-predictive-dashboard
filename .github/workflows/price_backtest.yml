name: Price Model Backtest

on:
  # Sunday 08:00 ICT: rebuild the 3-year, price-only validation artifacts.
  schedule:
    - cron: "0 1 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run price-only backtest
        run: python run_price_backtest.py

      - name: Commit artifacts
        id: commit_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backtest_data.json model_registry.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Refresh price backtest artifacts"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      # Deploy is handled by Vercel's GitHub integration (auto-deploys on push to main).

name: Daily Market Prediction

on:
  schedule:
    - cron: "0 23 * * *" # Runs at 23:00 UTC (06:00 ICT/Bangkok time)
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run predictive script
        run: python daily_predictor.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prediction_history.json dashboard_data.json
          git commit -m "Auto-update market predictions for $(date +'%Y-%m-%d')" || exit 0
          git push

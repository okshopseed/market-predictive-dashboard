name: Daily Market Prediction

on:
  schedule:
    # By 07:30 ICT, the prior trading day's Thai and U.S. markets have closed.
    - cron: "30 0 * * 1-5" # Runs Mon-Fri at 07:30 ICT/Bangkok time
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run predictive script
        run: python daily_predictor.py

      - name: Commit and push changes
        id: commit_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prediction_history.json dashboard_data.json news_history.json model_registry.json price_history.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No prediction changes to commit."
            exit 0
          fi
          git commit -m "Auto-update market predictions for $(TZ=Asia/Bangkok date +'%Y-%m-%d')"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      # Deploy is handled by Vercel's GitHub integration (auto-deploys on push to main).
